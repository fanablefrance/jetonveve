name: Routeur d'annonces (#aglomerateur -> posts forum)

# Lit les nouveaux messages de #aglomerateur et reposte chaque annonce dans le
# bon post de forum (routage par webhook_id). Annonces = peu fréquentes -> un
# passage toutes les ~12 min suffit (pas de temps réel nécessaire).
# 1er run : ancre le watermark au dernier message, ne rejoue pas l'historique.

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:
    inputs:
      dry:
        description: "Essai : calcule et log, ne poste RIEN (1 = oui)"
        required: false
        default: ""
      reset:
        description: "Ré-ancrer le watermark au dernier message, sans reposter (1 = oui)"
        required: false
        default: ""

concurrency:
  group: announce-router
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  router:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Router les annonces
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ROUTER_DRY: ${{ github.event.inputs.dry }}
          ROUTER_RESET: ${{ github.event.inputs.reset }}
        run: python scraper/announce_router.py

      - name: Commit du watermark
        if: always()
        run: |
          [ -f data/announce_router_state.json ] || exit 0
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/announce_router_state.json
          git diff --cached --quiet && { echo "Rien a committer."; exit 0; }
          for i in 1 2 3 4 5; do
            git commit -m "announce-router: watermark $(date -u +%FT%H:%M)" || exit 0
            git pull --rebase origin main && git push origin main && exit 0
            echo "push rejete, on refait."; sleep $((i * 5))
          done
          echo "watermark NON pousse apres 5 essais." >&2
