name: Burns OMI - sonde

# Diagnostic des sources de burn OMI (VeVe + StackR sur ETH / Base / Gochain)
# avant de batir le tracker. N'ecrit rien. Lire le log et le coller dans le chat.
# Necessite le secret ETHERSCAN_API_KEY.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Probe burns
        run: python -m scraper.burns_probe
