name: Sonde editions (tracker vs GraphQL)

# Sonde en LECTURE SEULE : aucun secret, aucun acces au Sheet, aucune ecriture.
# Elle appelle le tracker et VeVe GraphQL une derniere fois et compare, item
# par item, les champs que le daily de preda rafraichit chaque nuit.
# Objectif : prouver qu'on peut supprimer ~2 600 appels GraphQL par nuit.

on:
  workflow_dispatch:
    inputs:
      max:
        description: "Collectibles a sonder (0 = tous, ~2 600)"
        required: false
        default: "300"

jobs:
  sonde:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Comparer tracker et GraphQL
        env:
          PROBE_MAX: ${{ github.event.inputs.max || '300' }}
        run: python -m scraper.editions_probe
