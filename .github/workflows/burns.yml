name: Burns OMI - StackR (quotidien)

# Collecte les burns OMI de StackR (depots sur 0x821c, Base L2, Blockscout ouvert
# base.blockscout.com — pas de cle). Ecrit data/burns_daily.csv (commite) et
# affiche un recap dans le log. 1er run = backfill (~74k transferts), suivants
# = incremental. Autonome (pas de Google Sheet pendant le rodage).

on:
  schedule:
    - cron: "31 5 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Cap de pages (0 = illimite / backfill complet)"
        default: "0"

permissions:
  contents: write

concurrency:
  group: veve-burns
  cancel-in-progress: false

jobs:
  burns:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BURNS_MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Collecte burns StackR
        run: python -m scraper.burns
      - name: Commit historique burns (data/)
        if: ${{ always() }}
        run: |
          git config user.name "veve-burns-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/burns_daily.csv data/burns_state.json
          if git diff --cached --quiet; then echo "Rien a committer."; exit 0; fi
          git commit -m "burns: maj StackR $(date -u +%FT%H:%M)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep $((i * 5))
          done
