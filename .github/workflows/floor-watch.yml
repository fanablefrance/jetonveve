# ⚠️ DEPOT : fanablefrance/jetonveve   ·   CHEMIN : .github/workflows/floor-watch.yml
# Le projet vit sur 6 depots et DEUX comptes GitHub. Un fichier
# depose au mauvais endroit ne provoque aucune erreur : il dort.

name: Alertes sous-floor

# v13 : le module DIT pourquoi il se tait.
#
# Deux jours sans une seule alerte, et aucun moyen de savoir QUI serrait trop :
# la marge ? le benefice minimum ? l'ecart entre marches ? la preuve de vente ?
# Desserrer au hasard, c'est deviner — et si deux verrous cedent en meme temps,
# on ne saura toujours pas lequel bloquait. Le JOURNAL DES RECALES compte chaque
# candidat ecarte, par motif, et garde ceux qui ont manque de peu AVEC LEURS
# CHIFFRES. Un run, et on sait quel cran tourner, et de combien.
#
# TOUS LES SEUILS SONT DESORMAIS PILOTABLES SANS TOUCHER AU CODE (repo variables
# ou champs de lancement). Et `simuler = oui` calcule tout SANS RIEN ENVOYER :
# on ne regle pas un seuil en public, sur le Discord de la commu.

on:
  schedule:
    - cron: "3 * * * *"
  workflow_dispatch:
    inputs:
      simuler:
        description: "Tourner a blanc : tout calculer, N'ENVOYER RIEN (pour regler les seuils)"
        required: false
        default: "non"
        type: choice
        options: ["non", "oui"]
      polls:
        description: "Nombre de tours (2 min chacun)"
        required: false
        default: "25"
      margin_pct:
        description: "Marge nette minimale, en % (defaut 20)"
        required: false
        default: ""
      min_profit:
        description: "Benefice minimal, en $ (defaut 5)"
        required: false
        default: ""
      spread_pct:
        description: "Ecart minimal entre marches, en % (defaut 40)"
        required: false
        default: ""
      drop_pct:
        description: "Decote minimale sous le floor StackR, en % (defaut 10)"
        required: false
        default: ""
      sales_pages:
        description: "Pages d'historique de ventes (defaut 120 = ~7 j). L'elargir donne plus de PREUVES."
        required: false
        default: ""
      comic_max_usd:
        description: "📚 Comics : prix maximal pour alerter, en $ (defaut 2)"
        required: false
        default: ""
      mint_marge:
        description: "🎯 Numéros : écart max au floor pour dire « le vendeur ne l'a pas vu » (défaut 20 %)"
        required: false
        default: ""
      mint_score:
        description: "🎯 Numéros : score minimal (défaut 2 — 6 = seulement le #1 et la 1re édition publique)"
        required: false
        default: ""
      comic_max_listings:
        description: "📚 Comics : nb max d'offres en vente (defaut 3 — au-dela c'est le prix du marche)"
        required: false
        default: ""
      comic_supply:
        description: "📚 Comics : tirage maximal suivi (defaut 1000)"
        required: false
        default: ""
      veve_steal:
        description: "🩸 Vol sur le floor VeVe : allumer ce canal (chute du floor VeVe vs sa valeur recente)"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      steal_pct:
        description: "🩸 Chute minimale du floor VeVe pour alerter, en % (defaut 25)"
        required: false
        default: ""
      sale_spike:
        description: "📈 Vente au-dessus du floor : allumer ce canal (une vente reelle bien au-dessus du floor)"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      spike_ratio:
        description: "📈 Multiple du floor a partir duquel une vente est notable (defaut 3 = ×3)"
        required: false
        default: ""
      ath_on:
        description: "🆕 Nouveau ATH : allumer ce canal (floor qui bat son plus-haut historique) → canal dedie"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      atl_on:
        description: "📉 Plus-bas historique : allumer ce canal (floor au plus bas jamais vu) → canal principal"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      atl_stackr:
        description: "📉 Plus-bas StackR FRAIS (flux 2 min, instantane) : allumer ce canal → canal principal"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      whale_on:
        description: "🐋 Suivi comptes whale/team (tags 🟣C-PSEUDOS) → canal dedie"
        required: false
        # 22/07 : « true » par defaut au lancement MANUEL aussi (demande Preda —
        # les autres canaux actifs l'etaient deja, celui-ci avait ete oublie).
        default: "true"
        type: choice
        options: ["false", "true"]
      pic_on:
        description: "🔥 Pic d'activité hors drop : allumer ce canal (ventes du jour d'un item qui explosent vs sa moyenne) → canal dedie"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      pic_ratio:
        description: "🔥 Pic : multiple de la moyenne des jours actifs pour alerter (defaut 3 = ×3)"
        required: false
        default: ""
      hprix_feed:
        description: "🌉 Pont → 🟠H-PRIX : ecrire les floors collectibles qui changent dans data/hprix_feed.csv (preda l'ingere)"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]
      purger_ventes:
        description: "🧹 JETER l'historique des ventes (a faire UNE fois : il a ete collecte avec la mauvaise unite)"
        required: false
        default: "non"
        type: choice
        options: ["non", "oui"]
      require_sale:
        description: "Exiger une vente reelle avant d'alerter (garde-fou : 71 % des items ne se vendent JAMAIS)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

concurrency:
  group: floor-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      # 📚 Le catalogue vit dans le Sheet, donc chez preda (PRIVE) : tirage,
      # 1re edition publique, nombre d'offres, note de classement. Rien de tout
      # cela n'existe cote StackR. On va chercher le seul fichier dont on a
      # besoin, en lecture seule. Si ce checkout echoue, les signaux comics et
      # numeros s'eteignent tout seuls — le reste continue.
      - name: "Catalogue (CSV exporte par preda : tirage, 1re edition publique, offres, note)"
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: VeVePreda/scrapeur-veve
          token: ${{ secrets.PREDA_TOKEN }}
          path: _preda
          sparse-checkout: |
            data/elements.csv
            data/tracked_accounts.csv
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Veille des listings
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # Canal dedie (🆕 ATH + 📈 x3 + pic). Absent -> repli sur le principal.
          DISCORD_WEBHOOK_ATH: ${{ secrets.DISCORD_WEBHOOK_ATH }}
          FLOOR_SIMULER: ${{ github.event.inputs.simuler == 'oui' && '1' || '' }}
          # 🔴 CORRIGE LE 20/07 — CETTE LIGNE N'AVAIT PAS DE `vars.`
          # Consequence : poser la variable de depot FLOOR_POLLS=12 n'avait
          # AUCUN effet. L'experience lancee le 20/07 a tourne a 25 tours
          # ([1/25] dans le log) et l'aurait fait jusqu'au 22/07 pour rien.
          # ⭐ REFLEXE A PRENDRE : avant de recommander une variable, verifier
          # qu'elle est cablee jusqu'au bout — `vars.X` ICI **ET**
          # `os.environ.get("X")` dans le code. Les deux, sinon rien.
          FLOOR_POLLS: ${{ github.event.inputs.polls || vars.FLOOR_POLLS || '12' }}
          FLOOR_INTERVAL_S: ${{ vars.FLOOR_INTERVAL_S || '120' }}
          # Un reglage vaut pour TOUS les runs suivants (repo variable), un champ
          # de lancement ne vaut que pour CE run. L'ordre : champ > variable > defaut.
          FLOOR_MARGIN_PCT: ${{ github.event.inputs.margin_pct || vars.FLOOR_MARGIN_PCT || '20' }}
          FLOOR_MIN_PROFIT: ${{ github.event.inputs.min_profit || vars.FLOOR_MIN_PROFIT || '5' }}
          FLOOR_SPREAD_PCT: ${{ github.event.inputs.spread_pct || vars.FLOOR_SPREAD_PCT || '40' }}
          FLOOR_DROP_PCT: ${{ github.event.inputs.drop_pct || vars.FLOOR_DROP_PCT || '10' }}
          FLOOR_VEVE_PCT: ${{ vars.FLOOR_VEVE_PCT || '35' }}
          FLOOR_SALES_PAGES: ${{ github.event.inputs.sales_pages || vars.FLOOR_SALES_PAGES || '120' }}
          FLOOR_PURGER_VENTES: ${{ github.event.inputs.purger_ventes == 'oui' && '1' || '' }}
          FLOOR_REQUIRE_SALE: ${{ github.event.inputs.require_sale || vars.FLOOR_REQUIRE_SALE || 'true' }}
          # 📚 Signal 4 : le comic a petit tirage brade (ni preuve de vente, ni
          # promesse de revente : un PRIX D'ENTREE absurde au regard de la rarete)
          ELEMENTS_CSV: _preda/data/elements.csv
          DATES_CSV: data/dates_cles.csv
          # 💤 Les ecarts de prix sont ETEINTS (demande de Preda). Le code reste :
          # mettre FLOOR_ARBITRAGE=true (variable de depot) le rallume.
          FLOOR_ARBITRAGE: ${{ vars.FLOOR_ARBITRAGE || 'false' }}
          FLOOR_SPREAD: ${{ vars.FLOOR_SPREAD || 'false' }}
          # ⚠️ On ne peut pas lister sous 1 $ sur VeVe : un floor a 1,00 $ est le
          # PLANCHER de la plateforme, pas une aubaine.
          VEVE_PRIX_PLANCHER: ${{ vars.VEVE_PRIX_PLANCHER || '1' }}
          # 🎯 La chasse aux numeros
          MINT_ON: ${{ vars.MINT_ON || 'true' }}
          MINT_MARGE_PCT: ${{ github.event.inputs.mint_marge || vars.MINT_MARGE_PCT || '20' }}
          MINT_SCORE_MIN: ${{ github.event.inputs.mint_score || vars.MINT_SCORE_MIN || '2' }}
          MINT_MAX_ALERTES: ${{ vars.MINT_MAX_ALERTES || '25' }}
          COMIC_SUPPLY_MAX: ${{ github.event.inputs.comic_supply || vars.COMIC_SUPPLY_MAX || '1000' }}
          COMIC_MAX_USD: ${{ github.event.inputs.comic_max_usd || vars.COMIC_MAX_USD || '2' }}
          COMIC_MAX_ALERTES: ${{ vars.COMIC_MAX_ALERTES || '25' }}
          # « 8 offres a 1,75 $, ce n'est pas une affaire » : au-dela de ce
          # nombre d'offres au meme prix, c'est le prix du MARCHE, pas une aubaine.
          COMIC_MAX_LISTINGS: ${{ github.event.inputs.comic_max_listings || vars.COMIC_MAX_LISTINGS || '3' }}
          # 🩸📈 LOT 1 (15/07) — deux canaux single-marche, ETEINTS par defaut.
          # On les allume et on les calibre UN A LA FOIS (simuler d'abord).
          VEVE_STEAL_ON: ${{ github.event.inputs.veve_steal || vars.VEVE_STEAL_ON || 'false' }}
          VEVE_STEAL_PCT: ${{ github.event.inputs.steal_pct || vars.VEVE_STEAL_PCT || '25' }}
          VEVE_STEAL_MIN_USD: ${{ vars.VEVE_STEAL_MIN_USD || '1' }}
          VEVE_STEAL_MAX: ${{ vars.VEVE_STEAL_MAX || '10' }}
          SALE_SPIKE_ON: ${{ github.event.inputs.sale_spike || vars.SALE_SPIKE_ON || 'false' }}
          SALE_SPIKE_RATIO: ${{ github.event.inputs.spike_ratio || vars.SALE_SPIKE_RATIO || '3' }}
          SALE_SPIKE_MIN_USD: ${{ vars.SALE_SPIKE_MIN_USD || '5' }}
          SALE_SPIKE_MAX: ${{ vars.SALE_SPIKE_MAX || '10' }}
          # 🆕 ATH (canal dedie) · 📉 plus-bas (canal principal). ETEINTS par defaut.
          ATH_ON: ${{ github.event.inputs.ath_on || vars.ATH_ON || 'false' }}
          ATL_ON: ${{ github.event.inputs.atl_on || vars.ATL_ON || 'false' }}
          ATH_MAX: ${{ vars.ATH_MAX || '10' }}
          ATL_MAX: ${{ vars.ATL_MAX || '10' }}
          # 📉 n'alerte que si le floor est au moins X % SOUS l'ATL (defaut 25).
          ATL_MARGIN_PCT: ${{ vars.ATL_MARGIN_PCT || '25' }}
          ATL_FRESH_MIN: ${{ vars.ATL_FRESH_MIN || '70' }}
          ATL_STACKR_ON: ${{ github.event.inputs.atl_stackr || vars.ATL_STACKR_ON || 'false' }}
          ATL_STACKR_MIN_USD: ${{ vars.ATL_STACKR_MIN_USD || '1' }}
          ATL_STACKR_MARGIN_PCT: ${{ vars.ATL_STACKR_MARGIN_PCT || '5' }}
          ATL_STACKR_MAX: ${{ vars.ATL_STACKR_MAX || '10' }}
          # 🐋 suivi whale/team (fusionne ici : meme flux StackR)
          DISCORD_WEBHOOK_WHALE: ${{ secrets.DISCORD_WEBHOOK_WHALE }}
          WHALE_ON: ${{ github.event.inputs.whale_on || vars.WHALE_ON || 'false' }}
          WHALE_XFER_MIN: ${{ vars.WHALE_XFER_MIN || '5' }}
          WHALE_MIN_USD: ${{ vars.WHALE_MIN_USD || '1' }}
          WHALE_MAX: ${{ vars.WHALE_MAX || '10' }}
          WHALE_XFER_PAGES: ${{ vars.WHALE_XFER_PAGES || '3' }}
          # 🆕 n'alerte que si le floor depasse l'ATH d'au moins X % (defaut 25).
          ATH_MARGIN_PCT: ${{ vars.ATH_MARGIN_PCT || '25' }}
          # 🔥 PIC D'ACTIVITE HORS DROP (canal dedie WEBHOOK_ATH). ETEINT par
          # defaut : on calibre en simuler avant d'allumer, comme les autres. La
          # baseline vient des ~7 j de ventes deja charges (zero requete en plus) ;
          # un item qui vient de dropper n'a pas d'historique -> ecarte tout seul.
          PIC_ON: ${{ github.event.inputs.pic_on || vars.PIC_ON || 'false' }}
          PIC_RATIO: ${{ github.event.inputs.pic_ratio || vars.PIC_RATIO || '3' }}
          PIC_MIN_COUNT: ${{ vars.PIC_MIN_COUNT || '4' }}
          PIC_MIN_JOURS: ${{ vars.PIC_MIN_JOURS || '2' }}
          PIC_MIN_BASE: ${{ vars.PIC_MIN_BASE || '1' }}
          PIC_MAX: ${{ vars.PIC_MAX || '10' }}
          # 📊🔊 SIGNAUX BASELINES (magasin de prix prices-full). ETEINTS par defaut.
          HISTLOW_ON: ${{ vars.HISTLOW_ON || 'false' }}
          HISTLOW_PCT: ${{ vars.HISTLOW_PCT || '10' }}
          HISTLOW_MIN_POINTS: ${{ vars.HISTLOW_MIN_POINTS || '30' }}
          # 🔴 22/07 : lue par le code depuis le 20/07 mais jamais posable ici —
          # trouvee par tests/test_reglages_cables.py (rouge preexistant).
          HISTLOW_MAX: ${{ vars.HISTLOW_MAX || '10' }}
          VOL_ON: ${{ vars.VOL_ON || 'false' }}
          VOL_RATIO: ${{ vars.VOL_RATIO || '3' }}
          # 🌉 LE PONT VEILLE → 🟠H-PRIX (collectibles). OFF par defaut : on ecrit
          # dans data/hprix_feed.csv, preda l'ingere. Champ > variable > defaut.
          # La reference des floors est tenue a jour meme OFF (rien a cracher au
          # 1er allumage). Meme unite que H-PRIX (gems ~ $), zero conversion.
          HPRIX_FEED_ON: ${{ github.event.inputs.hprix_feed || vars.HPRIX_FEED_ON || 'false' }}
          HPRIX_FEED_DAYS: ${{ vars.HPRIX_FEED_DAYS || '7' }}
          HPRIX_FEED_CAP: ${{ vars.HPRIX_FEED_CAP || '1000000000' }}
          # 🔇 LE SPAM EST STRUCTURELLEMENT IMPOSSIBLE : plafond de messages par
          # run ET par jour, tous signaux confondus. Au-dela, on se TAIT — et on
          # ne memorise rien, donc rien n'est perdu.
          # Plafond anti-ban : 20 messages/min PAR webhook (fenetre glissante).
          FLOOR_MAX_MSG_MIN: ${{ vars.FLOOR_MAX_MSG_MIN || '20' }}
          FLOOR_PAUSE_MSG_S: ${{ vars.FLOOR_PAUSE_MSG_S || '3' }}

          # ═══════════════════════════════════════════════════════════════
          # 🔴 20/07 — LES 15 REGLAGES QUE LE CODE LISAIT SANS QUE PERSONNE
          #            NE PUISSE LES POSER
          # ═══════════════════════════════════════════════════════════════
          # Controle systematique : 76 reglages lus par floor_watch.py, 67
          # poses ici, 15 absents. Un `os.environ.get("X", defaut)` sans ligne
          # correspondante ne casse RIEN et ne dit RIEN — il applique
          # silencieusement son defaut. C'est la pire des pannes : muette.
          # Trois recommandations etaient donc inapplicables sans qu'aucun
          # message ne le signale (l'optimisation -60 %, le plafond de
          # vraisemblance, la sentinelle anti-blocage).
          #
          # Commande de controle, a relancer apres toute modification du code :
          #   comparer  re.findall(r'os\.environ\.get\(\s*"([A-Z_0-9]+)"', code)
          #        a    re.findall(r'^\s+([A-Z_0-9]+):', workflow)
          # (le test tests/test_reglages_cables.py le fait automatiquement)

          # --- Collecte : le cout en requetes ---------------------------------
          # ⭐ L'OPTIMISATION EN ATTENTE : 250 au lieu de 100 = -60 % de
          # requetes A DONNEES IDENTIQUES (moins d'appels, plus gros chacun).
          # Laisse a 100 = le defaut du code : AUCUN changement de comportement
          # tant que Preda n'a pas pose la variable. Une seule variable a la
          # fois, sinon la mesure ne dit plus rien.
          FLOOR_ELEM_LIMIT: ${{ vars.FLOOR_ELEM_LIMIT || '100' }}
          FLOOR_LISTINGS: ${{ vars.FLOOR_LISTINGS || '50' }}
          # ⚠️ NE PAS DESCENDRE SANS REFLECHIR : le floor n'est relu qu'UNE
          # fois par run. C'est la cause mesuree du baillon de 📉 (ATL_FRESH_MIN
          # = 70 min face a un ecart de refresh observe a 233 min). Le remede
          # est le cron/VPS, pas ce chiffre.
          FLOOR_REFRESH_MIN: ${{ vars.FLOOR_REFRESH_MIN || '60' }}
          FLOOR_TIMEOUT: ${{ vars.FLOOR_TIMEOUT || '45' }}
          FLOOR_RETRIES: ${{ vars.FLOOR_RETRIES || '6' }}
          FLOOR_PAUSE: ${{ vars.FLOOR_PAUSE || '0.2' }}

          # --- Seuils economiques --------------------------------------------
          FLOOR_FEE_PCT: ${{ vars.FLOOR_FEE_PCT || '8.5' }}
          FLOOR_MIN_USD: ${{ vars.FLOOR_MIN_USD || '1' }}
          FLOOR_COOLDOWN_H: ${{ vars.FLOOR_COOLDOWN_H || '6' }}

          # --- ⏱️ Fraicheur des evenements du flux (22/07) --------------------
          # Les cartes issues du flux StackR (🎯 📚 📉-StackR 🐋) portent
          # desormais TOUJOURS l'heure de l'evenement (« il y a 2 h 31 »).
          # En plus, au-dela de cet age (en minutes), l'evenement est IGNORE.
          # 0 = pas de filtre. Poser vars.FLOOR_EVENT_MAX_AGE_MIN=45 pour ne
          # plus jamais recevoir un « rattrapage » de 2 h apres un cron saute.
          # ⚠️ Le vrai remede du retard reste la cadence (VPS / pinger).
          FLOOR_EVENT_MAX_AGE_MIN: ${{ vars.FLOOR_EVENT_MAX_AGE_MIN || '0' }}

          # --- 🛡️ Le plafond de vraisemblance --------------------------------
          # Valeur fixee par Preda : « au-dela de 50 000 $ ce n'est pas la
          # peine, meme les grails du marche ne depassent pas 15 k ». Releve :
          # 20 items a floor > 100 000 $ (dont un a 42 420 420 420 420 $) et
          # une vente a 18 666 667 $. Le sujet n'est pas le volume — c'est rare
          # — mais la CREDIBILITE : une seule carte « vendu 18 666 667 $ »
          # decredibilise un canal payant entier.
          FLOOR_PRIX_MAX: ${{ vars.FLOOR_PRIX_MAX || '50000' }}
          ATH_CAP: ${{ vars.ATH_CAP || '1000000000' }}

          # --- 🚨 La sentinelle anti-blocage ---------------------------------
          # Si la recolte tombe sous MIN_RATIO de la precedente, on crie au lieu
          # de conclure au calme plat. Une recolte maigre et un marche calme se
          # ressemblent dans un log — pas dans les chiffres.
          FLOOR_MIN_RATIO: ${{ vars.FLOOR_MIN_RATIO || '0.8' }}
          FLOOR_MAIGRE_ALERTE: ${{ vars.FLOOR_MAIGRE_ALERTE || '3' }}

          # --- Chemins : POSES EN DUR, ET C'EST VOLONTAIRE -------------------
          # ⛔ Ces deux-la ne prennent PAS de `vars.`, contrairement aux 13
          # autres. L'etape de commit plus bas teste `data/floor_state.json` et
          # `data/hprix_feed.csv` en dur : une variable mal saisie ferait ecrire
          # le run ailleurs, le commit ne trouverait rien, et LA RECOLTE DU RUN
          # SERAIT PERDUE EN SILENCE. « Pilotable » ne vaut pas le risque quand
          # la seule raison de changer un chemin est un test.
          FLOOR_STATE: data/floor_state.json
          HPRIX_FEED: data/hprix_feed.csv

          # --- ⭐ 5 DE PLUS, TROUVES EN ELARGISSANT LE CONTROLE ---------------
          # Le workflow ne lance qu'un module (`python -m scraper.floor_watch`),
          # mais celui-ci en PILOTE trois autres : numeros, price_baseline et
          # whale_watch. Leurs reglages se lisent dans le meme environnement et
          # personne ne les posait non plus. Tous laisses au defaut du code :
          # aucun changement de comportement, juste la main rendue.
          #
          # 🎯 numeros — le signal LE PLUS ACTIF (8,9 tirs/jour). « Remarquable »
          # = dans les BAS premiers numeros ou les HAUT derniers du tirage.
          MINT_BAS: ${{ vars.MINT_BAS || '10' }}
          MINT_HAUT: ${{ vars.MINT_HAUT || '10' }}
          # 📊 ou vivent les percentiles du magasin de prix. A ne changer que
          # pour pointer une release de test.
          BASELINES_SRC: ${{ vars.BASELINES_SRC || '' }}
          # 🐋 duree de memoire du dedoublonnage. ⚠️ La descendre fait
          # RE-ALERTER de vieux evenements — c'est un anti-doublon, pas un cache.
          WHALE_VU_TTL_H: ${{ vars.WHALE_VU_TTL_H || '48' }}
          # 🐋 le pont : le CSV des comptes tagues, ecrit par le sparse-checkout
          # `_preda` plus haut. Absent -> le module se tait poliment.
          TRACKED_CSV: _preda/data/tracked_accounts.csv
        run: python -m scraper.floor_watch

      # ⚠️ LA RECOLTE EST SACREE — y compris contre git.
      # Le 14/07, un `git pull --rebase` a bute sur data/floor_state.json
      # (« CONFLICT ») et l'etat du run n'a JAMAIS ete pousse : ventes
      # decouvertes, floors memorises, budget de messages — tout perdu.
      # On ne rebase donc plus cet etat : on le FUSIONNE. Les deux versions sont
      # vraies (chaque run a vu ce que l'autre n'a pas vu) ; ecraser reviendrait
      # a jeter la moitie de la recolte.
      - name: Commit de l'etat (fusion, jamais d'ecrasement)
        if: always()
        run: |
          [ -f data/floor_state.json ] || exit 0
          cp data/floor_state.json /tmp/mien.json
          # 🌉 Le pont : data/hprix_feed.csv n'est ecrit QUE par ce workflow
          # (runs serialises par la concurrency) -> on reprend NOTRE version
          # complete (deja auto-trimmee) apres le reset, qui l'effacerait sinon.
          [ -f data/hprix_feed.csv ] && cp data/hprix_feed.csv /tmp/hprix_feed.csv
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main                # on repart du depot
            git checkout origin/main -- data/floor_state.json 2>/dev/null || true
            python -m scraper.floor_state_merge /tmp/mien.json data/floor_state.json
            [ -f /tmp/hprix_feed.csv ] && cp /tmp/hprix_feed.csv data/hprix_feed.csv
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/floor_state.json
            [ -f data/hprix_feed.csv ] && git add data/hprix_feed.csv
            git diff --cached --quiet && { echo "Rien a committer."; exit 0; }
            git commit -m "floor_watch: etat (fusionne) + pont H-PRIX"
            git push origin main && exit 0
            echo "push rejete — on refusionne avec l'etat du depot."
            sleep $((i * 5))
          done
          echo "⛔ etat NON pousse apres 5 essais." >&2
