name: Alertes sous-floor

# v3 : on ne balaie plus les 6 011 floors — on ecoute le FLUX DES LISTINGS
# (publicVeve.getAllLatestListings_v2), ou chaque mise en vente arrive avec son
# prix ET le floor du moment. ~695 listings/jour -> 1 requete toutes les 2 min
# suffit (au lieu de 61 par tour) : plus reactif ET bien plus discret.
# Un run = 25 tours de 2 min = ~50 min de veille, relance chaque heure.

on:
  schedule:
    - cron: "3 * * * *"
  workflow_dispatch:
    inputs:
      drop_pct:
        description: "Decote minimale pour alerter (%)"
        required: false
        default: "10"
      polls:
        description: "Nombre de tours (2 min chacun)"
        required: false
        default: "25"

permissions:
  contents: write

concurrency:
  group: floor-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Veille des listings
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          FLOOR_DROP_PCT: ${{ github.event.inputs.drop_pct || '10' }}
          FLOOR_POLLS: ${{ github.event.inputs.polls || '25' }}
          FLOOR_INTERVAL_S: "120"
        run: python -m scraper.floor_watch

      - name: Commit de l'etat
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/floor_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "floor_watch: etat"
          git push || true
