# ⚠️ DEPOT : VeVePreda/scrapeur-veve   ·   CHEMIN : .github/workflows/elements-v2-silence.yml
# Le projet vit sur 6 depots et DEUX comptes GitHub. Un fichier
# depose au mauvais endroit ne provoque aucune erreur : il dort.

name: Pont elements v2 (double en silence)

# 🌉 CHANTIER « le Sheet = interface, l'entrepot = magasin » (22/07/2026).
# Fabrique data/elements_v2.csv depuis le TRACKER et le compare au pont v1
# (onglets froids) SANS RIEN DEBRANCHER : la prod (jetonveve 🎯/📚) continue
# de lire la v1. Rien n'est commite : tout se lit dans le log du run.
#
# LA REGLE DE BASCULE : plusieurs rapports consecutifs avec 0 ecart sur les
# colonnes STABLES et un drift VIVANTES explicable par l'horaire. Alors
# seulement, on fera pointer l'export officiel sur le builder v2.
#
# ⚠️ Quota Sheets partage : le cron est pose a un creneau calme (les retards
# GitHub de ~2-3 h le laissent loin du daily et de ses lectures).

on:
  schedule:
    - cron: "30 10 * * *"        # ~12:30 FR prevu (en pratique +2-3 h, sans importance)
  workflow_dispatch:
    inputs:
      seuil_stable:
        description: "Nb d'ecarts STABLES tolere avant de marquer le run en erreur (0 = tout signaler mais run vert)"
        required: false
        default: "0"

permissions:
  contents: read

concurrency:
  group: elements-v2-silence
  cancel-in-progress: false

jobs:
  silence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Construire elements_v2.csv (tracker + notes + 2 colonnes entieres)
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m scraper.export_elements_v2

      - name: Comparer au pont v1 (celui que la prod lit)
        env:
          COMPARE_SEUIL_STABLE: ${{ github.event.inputs.seuil_stable || '0' }}
        run: python -m scraper.compare_elements
