name: Base locale (veve.duckdb)

# Construit la BASE CONSOLIDEE requetable (transfers CC+IMX unifies/dedupliques,
# holders, ledger, profiles) et la publie en Release "base-locale".
# Preda telecharge veve.duckdb dans Archive/base/ -> analyses ad hoc en session.
# A relancer quand on veut une base fraiche (manuel).
#
# TOURNE SUR JETONVEVE (public = minutes illimitees). Les sources publiques
# (astronema, paolo) se lisent avec le token du job ; les 2 sources du repo
# PRIVE preda (chain-archive-daily + ledger-data) demandent le secret
# PREDA_TOKEN : jeton fine-grained du compte vevepreda, repo scrapeur-veve,
# permission Contents: Read-only — a creer dans Settings > Developer settings
# > Personal access tokens, puis coller dans les secrets de CE repo.
# Sans PREDA_TOKEN : base construite quand meme, sans les 31 derniers jours
# CC ni les tables ledger/profiles.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: veve-base
  cancel-in-progress: false

jobs:
  base:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install duckdb
        run: pip install duckdb

      - name: Cache archives immuables (chain-archive + imx-archive)
        id: cache-static
        uses: actions/cache/restore@v4
        with:
          path: |
            dl_static
            dl_imx
          key: archives-immuables-v1

      - name: Telecharger l'archive transferts (si cache absent)
        if: ${{ steps.cache-static.outputs.cache-hit != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dl_static dl_imx
          gh release download chain-archive --repo astronemagame-maker/astronema --dir dl_static --pattern '*.csv.gz'
          gh release download imx-archive --repo lepaolo/paolo --dir dl_imx --pattern '*.csv.gz'

      - name: Sauver le cache immediatement
        if: ${{ steps.cache-static.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            dl_static
            dl_imx
          key: archives-immuables-v1

      - name: Sources publiques (snapshot holders)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dl dl_snap data
          cp -al dl_static/. dl/ 2>/dev/null || cp -r dl_static/. dl/
          gh release download holders-snapshot --repo lepaolo/paolo --dir dl_snap --pattern '*.csv.gz'

      - name: Sources du repo prive preda (continuite + grand livre)
        env:
          GH_TOKEN: ${{ secrets.PREDA_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PREDA_TOKEN absent : base sans les 31 derniers jours CC ni ledger/profiles."
            exit 0
          fi
          gh release download chain-archive-daily --repo VeVePreda/scrapeur-veve --dir dl --pattern '*.csv.gz' \
            || echo "chain-archive-daily inaccessible."
          gh release download ledger-data --repo VeVePreda/scrapeur-veve --dir data --pattern '*.csv.gz' \
            || echo "ledger-data inaccessible."
          ls dl | wc -l && ls data || true

      - name: Construire veve.duckdb
        env:
          BASE_OUT: veve.duckdb
          DUCK_MEM: 12GB   # runner public = 16 Go
        run: python -m scraper.base_build

      - name: Publier (Release base-locale)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view base-locale >/dev/null 2>&1 || \
            gh release create base-locale --title "Base locale consolidee (DuckDB)" \
              --notes "veve.duckdb : transfers (CC+IMX unifies, dedup), holders, ledger, profiles. A telecharger dans Archive/base/. Reconstruire via le workflow 'Base locale'."
          gh release upload base-locale veve.duckdb --clobber
          ls -lh veve.duckdb
