name: analytics-derived

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: analytics-derived
  cancel-in-progress: false

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependances
        run: pip install duckdb

      - name: "Telecharger transfers-full + catalogue"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download transfers-full -p transfers_full.csv.gz -D .
          gh release download catalogue -p catalogue.csv.gz -D .
          ls -lh transfers_full.csv.gz catalogue.csv.gz

      - name: "Secours N-1 (copie de la release actuelle AVANT ecrasement)"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view analytics-derived >/dev/null 2>&1; then
            mkdir -p prev
            gh release download analytics-derived -D prev --clobber || true
            if [ -n "$(ls -A prev 2>/dev/null)" ]; then
              gh release view analytics-derived-prev >/dev/null 2>&1 || \
                gh release create analytics-derived-prev \
                  -t "Analytics derives — veille (secours N-1)" \
                  -n "Copie automatique de la release analytics-derived AVANT sa derniere mise a jour. Retombee pour les consommateurs si un run produit un fichier corrompu."
              gh release upload analytics-derived-prev prev/* --clobber
              echo "✅ N-1 sauvegarde ($(ls prev | wc -l) fichiers)."
            fi
          else
            echo "ℹ️ Premiere publication — pas de N-1."
          fi

      - name: "Calcul des derives (DuckDB)"
        run: |
          export RUN_DATE=$(TZ=America/Los_Angeles date +%F)
          export PARQUET_OUT=transfers.parquet
          echo "RUN_DATE=$RUN_DATE (PT)"
          python -m scraper.analytics_derived transfers_full.csv.gz derived
          ls -lh derived/ transfers.parquet

      - name: "Calcul ledger derives (pulse + corner 111 + profils A VIE)"
        run: |
          export RUN_DATE=$(TZ=America/Los_Angeles date +%F)
          python -m scraper.ledger_derived transfers.parquet catalogue.csv.gz derived
          ls -lh derived/

      - name: "Publier la Release analytics-derived"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view analytics-derived >/dev/null 2>&1 || \
            gh release create analytics-derived \
              -t "Analytics derives" \
              -n "CSV derives de transfers-full : grand livre, profils wallets, cornérisation, supply fantome, pulse, corner 111, profils complets."
          gh release upload analytics-derived derived/* --clobber
          echo "✅ Release analytics-derived mise a jour."

      - name: "Publier transfers.parquet (Release transfers-full)"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload transfers-full transfers.parquet --clobber
          echo "✅ transfers.parquet publie — queryable par URL (DuckDB httpfs, lecture partielle)."
